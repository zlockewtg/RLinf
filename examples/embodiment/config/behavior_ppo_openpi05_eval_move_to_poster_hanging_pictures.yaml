defaults:
  - env/behavior_r1pro@env.train
  - env/behavior_r1pro@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

skill_eval:
  skill_name: "move to"
  skill_slug: move_to_poster
  task_id: 34
  activity_name: hanging_pictures
  scene_model: house_double_floor_lower
  activity_instance_id: [2, 3, 4, 5, 6, 9, 10, 11]
  dataset_root: /mnt/public/mjwei/download_models/2025-challenge-demos

cluster:
  num_nodes: 1
  component_placement:
    rollout,env,actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "behavior_ppo_openpi05_eval_${skill_eval.skill_slug}_${skill_eval.activity_name}"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1
  only_eval: True
  val_check_interval: -1
  save_interval: 40
  seq_length: 4096
  max_prompt_length: 50
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 2
  reward_coef: 2048
  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_path: /mnt/public/tgy/ckpts/pi05-b1kpt12-cs32
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 16
  seed: 1234
  num_steps: 10
  enable_offload: True
  model:
    model_path: /mnt/public/tgy/ckpts/pi05-b1kpt12-cs32
    num_action_chunks: 32
    action_dim: 23
    add_value_head: True
    num_images_in_input: 3
    proprio_dim: 32
    openpi:
      config_name: "pi05_behavior"
      detach_critic_input: True
      joint_logprob: False
      noise_level: 0.0
      action_env_dim: ${actor.model.action_dim}
      noise_method: "flow_sde"
    openpi_data:
      assets:
        assets_dir: ${actor.model.model_path}
        asset_id: assets/behavior-1k/2025-challenge-demos
  optim:
    lr: 1.0e-4
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 10.0
    weight_decay: 0.01
    critic_warmup_steps: 0

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    max_episode_steps: 32
    max_steps_per_rollout_epoch: 32
  eval:
    total_num_envs: 8
    max_episode_steps: 1024
    max_steps_per_rollout_epoch: 1024
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    skip_intermediate_obs_in_chunk: False
    use_subtask_prompt: True
    subtask_prompt_only: True
    replay_init:
      enabled: True
      dataset_root: /mnt/public/mjwei/download_models/2025-challenge-demos
      task_id: 34
      skill_name: "move to"
      skill_occurrence: 0
      stage_boundary: start
      replay_ratio: 1.0
      jitter_steps: 0
      noise_std: 0.0
    omni_config:
      env:
        action_frequency: 30
        physics_frequency: 120
        rendering_frequency: 30
      task:
        activity_name: hanging_pictures
        activity_definition_id: 0
        activity_instance_dir: ${oc.env:OMNIGIBSON_DATA_PATH}/2025-challenge-task-instances/scenes/house_double_floor_lower/json/house_double_floor_lower_task_hanging_pictures_instances
        activity_instance_id: [2, 3, 4, 5, 6, 9, 10, 11]
        instance_file_format: tro_state
        instance_resample_mode: offline
        online_object_sampling: False
        use_presampled_robot_pose: True
        reward_config:
          reward_mode: stage
          task_specific_reward_name: hanging_pictures

reward:
  use_reward_model: False

critic:
  use_critic_model: False
