env_type: serl
gym_id: PandaPickCubeVision-v0

# IMPORTANT: mimic ManiSkill extracted_obs format
obs_format: vla

# images + state extraction
obs_mode: image
image_key: images
state_key: state

task_prompt: "Pick up the cube."
use_wrist_as_extra_view: True

mujoco_gl: egl
render: false

seed: 0
total_num_envs: null
group_size: 1

auto_reset: True
ignore_terminations: False
max_steps_per_rollout_epoch: 256
max_episode_steps: 200

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train
