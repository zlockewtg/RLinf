defaults:
  - env/behavior_r1pro@env.train
  - env/behavior_r1pro@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1
  component_placement:
    rollout,env,actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "behavior_ppo_openpi05_eval_skill_chain"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1
  only_eval: True
  val_check_interval: -1
  save_interval: 40
  seq_length: 4096
  max_prompt_length: 50
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_coef: 2048
  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_path: /mnt/public/tgy/ckpts/skill_pool/move_to/41400_pytorch
    precision: ${actor.model.precision}
  skill_chain:
    policy_map: ${env.eval.skill_chain.policy_map}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 16
  seed: 1234
  num_steps: 10
  enable_offload: True
  model:
    model_path: /mnt/public/tgy/ckpts/skill_pool/move_to/41400_pytorch
    num_action_chunks: 32
    action_dim: 23
    add_value_head: True
    num_images_in_input: 3
    proprio_dim: 32
    openpi:
      config_name: "pi05_behavior"
      detach_critic_input: True
      joint_logprob: False
      noise_level: 0.0
      action_env_dim: ${actor.model.action_dim}
      noise_method: "flow_sde"
    openpi_data:
      assets:
        assets_dir: ${actor.model.model_path}
        asset_id: assets/behavior-1k/2025-challenge-demos
  optim:
    lr: 1.0e-4
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 10.0
    weight_decay: 0.01
    critic_warmup_steps: 0

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    max_episode_steps: 32
    max_steps_per_rollout_epoch: 32
  eval:
    total_num_envs: 8
    max_episode_steps: 4096
    max_steps_per_rollout_epoch: 4096
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
      min_final_frames: 2
      extra_info_on_video:
        - episode.skill_chain_completed_count
        - episode.skill_chain_skill_success
        - episode.skill_chain_stage_idx
        - episode.skill_chain_post_success_remaining
        - episode.skill_chain_failed
        - episode.skill_chain_done
    skip_intermediate_obs_in_chunk: False
    use_subtask_prompt: True
    subtask_prompt_only: True
    success_metric: env
    skill_chain:
      enabled: True
      stage_names:
        - move to
        - pick up from
        - press
        - place on
      stage_prompts:
        - move to radio
        - pick up radio from coffee table
        - press radio
        - place radio on coffee table
      reward_stage_names:
        - move_to_radio
        - pickup_from_support
        - press_radio
        - place_on_support
      reward_stage_indices: [0, 1, 2, 3]
      max_steps_per_subtask: 1024
      step_limits_by_skill:
        pick up from: 2048
      post_success_steps_by_skill:
        pick up from: 0
      prompts_by_skill:
        press: press radio
      use_annotation_step_limits: False
      move_to_success_distance_threshold: 0.8
      policy_map:
        move to: /mnt/public/tgy/ckpts/skill_pool/move_to/41400_pytorch
        pick up from: /mnt/public/tgy/ckpts/skill_pool/pick_up/pick_up_torch
        press: /mnt/public/tgy/ckpts/skill_pool/pi05_b1k-press_skill/28200
        place on: /mnt/public/tgy/ckpts/skill_pool/pi05_b1k-place_on_skill/19999
    replay_init:
      enabled: False
      dataset_root: /mnt/public/mjwei/download_models/2025-challenge-demos
      task_id: 0
      sample_mode: sequential
      stage_boundary: start
      replay_ratio: 0.0
      jitter_steps: 0
      noise_std: 0.0
    distance_reward:
      enabled: True
      target_object: radio
      distance_axes: xy
      success_threshold: ${env.eval.skill_chain.move_to_success_distance_threshold}
      success_bonus: 0.0
    omni_config:
      env:
        action_frequency: 30
        physics_frequency: 120
        rendering_frequency: 30
      task:
        activity_instance_dir: ${oc.env:OMNIGIBSON_DATA_PATH}/2025-challenge-task-instances/scenes/house_double_floor_lower/json/house_double_floor_lower_task_turning_on_radio_instances
        activity_instance_id: [242, 295, 211, 203, 109, 181, 197, 187, 214, 139]
        instance_file_format: tro_state
        instance_resample_mode: offline
        online_object_sampling: False
        use_presampled_robot_pose: True
        reward_config:
          reward_mode: stage
          task_specific_reward_name: turning_on_radio

reward:
  use_reward_model: False

critic:
  use_critic_model: False
